<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Paul University QuickTest Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f97415",
                        "background-light": "#f8f7f5",
                        "background-dark": "#030712",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }
        .orange-glow {
            background: radial-gradient(circle at 50% 50%, rgba(249, 116, 21, 0.15) 0%, rgba(3, 7, 18, 0) 70%);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col overflow-x-hidden">
<!-- Ambient Background Glows -->
<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] orange-glow pointer-events-none"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] orange-glow pointer-events-none"></div>
<div class="layout-container flex h-full grow flex-col">
<!-- Top Navigation -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 px-6 md:px-10 py-4 z-10 backdrop-blur-md bg-white/5">
<div class="flex items-center gap-3">
<div class="size-8 bg-primary rounded-lg flex items-center justify-center text-white">
<span class="material-symbols-outlined text-2xl">school</span>
</div>
<h2 class="text-slate-900 dark:text-white text-xl font-bold leading-tight tracking-tight">QuickTest</h2>
</div>
<div class="flex flex-1 justify-end gap-6 items-center">
<nav class="hidden md:flex items-center gap-8">
<a class="text-slate-600 dark:text-slate-300 hover:text-primary dark:hover:text-primary transition-colors text-sm font-medium" href="#">Home</a>
<a class="text-slate-600 dark:text-slate-300 hover:text-primary dark:hover:text-primary transition-colors text-sm font-medium" href="#">About</a>
<a class="text-slate-600 dark:text-slate-300 hover:text-primary dark:hover:text-primary transition-colors text-sm font-medium" href="#">Support</a>
</nav>
<button class="flex min-w-[100px] cursor-pointer items-center justify-center rounded-xl h-10 px-5 bg-primary text-white text-sm font-bold transition-transform active:scale-95 shadow-lg shadow-primary/20">
                    Sign Up
                </button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center p-4 md:p-8 relative">
<!-- Glassmorphic Card Container -->
<div class="w-full max-w-[440px] bg-white/5 dark:bg-slate-900/40 backdrop-blur-xl border border-slate-200/20 dark:border-white/10 rounded-xl p-8 shadow-2xl">
<div class="flex flex-col items-center mb-8">
<div class="size-16 rounded-full bg-primary/10 flex items-center justify-center mb-4 border border-primary/20">
<span class="material-symbols-outlined text-primary text-3xl">lock_open</span>
</div>
<h1 class="text-slate-900 dark:text-white text-3xl font-bold leading-tight text-center">Welcome Back</h1>
<p class="text-slate-500 dark:text-slate-400 mt-2 text-sm text-center">Study smart.</p>
</div>
<!-- Login Form -->
<form class="space-y-6">
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium px-1">Username</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">person</span>
<input class="w-full bg-slate-100/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl h-14 pl-12 pr-4 text-slate-900 dark:text-white placeholder:text-slate-500 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" placeholder="Enter your name" type="text"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium px-1">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-slate-100/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl h-14 pl-12 pr-12 text-slate-900 dark:text-white placeholder:text-slate-500 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-200 transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
<div class="flex justify-end mt-1">
<a class="text-xs text-primary hover:underline" href="#">Forgot Password?</a>
</div>
</div>
<button class="w-full flex items-center justify-center rounded-xl h-14 bg-primary text-white text-base font-bold transition-all hover:bg-primary/90 active:scale-[0.98] shadow-lg shadow-primary/30" type="submit">
                        Login to Practice
                    </button>
</form>
<!-- Footer Highights -->
<div class="mt-10 pt-6 border-t border-slate-200/10 flex flex-col items-center gap-4">
<div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-emerald-500/10 border border-emerald-500/20">
<span class="material-symbols-outlined text-emerald-500 text-sm">verified_user</span>
<span class="text-[10px] uppercase tracking-widest font-bold text-emerald-500">Secured with JWT Authentication</span>
</div>
</div>
</div>
<!-- Branding Footer -->
<footer class="mt-auto py-8 flex flex-col items-center gap-2 opacity-60">
<p class="text-xs text-slate-500 dark:text-slate-400 font-medium">Made by <span class="text-primary">Gbengaayo Olawale</span></p>
<p class="text-[10px] text-slate-500/60">© 2024 Paul University, Awka. All rights reserved.</p>
</footer>
</main>
</div>
</body></html>
